<header class="neo-header" role="banner">
  <span class="neo-header__rule neo-header__rule--left" aria-hidden="true"></span>
  <div class="neo-header__brand">
    <img
      class="neo-header__logo"
      [src]="logoSrc"
      [alt]="logoAlt"
      loading="eager"
      decoding="async"
    />
  </div>
  <span class="neo-header__rule neo-header__rule--right" aria-hidden="true"></span>
</header>
