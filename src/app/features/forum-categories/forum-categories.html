<!-- @autor LaMendez -->
<section class="forum-cats">
  <div class="forum-cats__header">
    <div>
      <h2 class="forum-cats__title">Disciplinas de enfoque</h2>
    </div>
  </div>
  <div class="forum-cats__grid">
    @for (cat of categories; track cat.label) {
      <button class="cat-card" type="button" [class.cat-card--dark]="cat.dark" [class.cat-card--active]="selectedCategory() === cat.label" [attr.aria-pressed]="selectedCategory() === cat.label" (click)="selectCategory(cat.label)">
        <div class="cat-card__icon"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1" aria-hidden="true">{{ cat.icon }}</span></div>
        <div class="cat-card__body">
          <h3 class="cat-card__name">{{ cat.label }}</h3>
          <p class="cat-card__desc">{{ cat.description }}</p>
          <span class="cat-card__count">{{ cat.count }}</span>
        </div>
      </button>
    }
  </div>
</section>
